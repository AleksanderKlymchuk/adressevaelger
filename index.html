<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Adressevælger test</title>
    <link rel="stylesheet" href="adressevaelger.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Adressevælger test</h1>

      <fieldset id="mode-select">
        <legend>Vælg opslagstype</legend>
        <label>
          <input type="radio" name="mode" value="adresse" checked />
          Adresse opslag
        </label>
        <label>
          <input type="radio" name="mode" value="husnummer" />
          Husnummer opslag
        </label>
      </fieldset>

      <div class="field">
        <label for="adressevaelger-input">Søg</label>
        <div id="search-container"></div>
      </div>

      <section id="result-section" hidden>
        <h2>Valgt</h2>
        <p class="selected-id-line">ID: <code id="selected-id"></code></p>
        <pre id="selected-json" class="json-block"></pre>
      </section>

      <section id="extended-section" hidden>
        <h2>Udvidet opslag</h2>
        <p id="loading" class="status status-loading" hidden>Henter data…</p>
        <p id="error" class="status status-error" hidden></p>
        <pre id="extended-json" class="json-block"></pre>
      </section>
    </main>

    <script src="adressevaelger.iife.js"></script>
    <script src="app.js"></script>
  </body>
</html>
